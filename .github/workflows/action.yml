name: Build Docker Image
run-name: Running build image
on:
    push:
        tags:
            - v1.*
jobs:
    build-app:
        name: "Build Go Application"
        runs-on: ubuntu-latest
        outputs:
            output1: ${{ steps.upload-bin.outputs.artifact-id }}

        steps:
            - name: setup Go 
              uses: actions/setup-go@v5
              with:
                go-version : "1.26.4"

            - name: Get source
              uses: actions/checkout@v4
            - name: Download dependencies
              run: go mod tidy
            - name: build-app
              run: go build -o auth-app main.go
            - name: Save artifact
              uses: actions/upload-artifact@v4
              with:
                name: build-result
                path: auth-app